<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NomAI - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { font-family: 'Inter', sans-serif; }

      :root {
        --dark-primary: #000000;
        --dark-primary-variant: #B0BEC5;
        --dark-primary-variant-2: #383838;
        --dark-secondary: #434343;
        --dark-secondary-variant: #757575;
        --dark-success: #00C853;
        --dark-success-variant: #66BB6A;
        --dark-info: #2979FF;
        --dark-info-variant: #80D8FF;
        --dark-warning: #FFB300;
        --dark-warning-variant: #FFCC80;
        --dark-error: #D32F2F;
        --dark-error-variant: #EF9A9A;
        --dark-surface: #121212;
        --dark-background: #1E1E1E;
        --dark-on-primary: #FFFFFF;
        --dark-on-secondary: #FFFFFF;
        --dark-on-success: #000000;
        --dark-on-info: #000000;
        --dark-on-warning: #000000;
        --dark-on-error: #FFFFFF;
        --dark-on-surface: #FFFFFF;
        --dark-on-background: #FFFFFF;

        --light-grey-tile: #F9F8FD;
        --grey-light: #EBEBEB;
        --selected-tile: #212121;
        --blue-grey: #514f62;
        --gauge-color: rgba(128, 128, 128, 0.2);
        --protein-color: #E91E63;
        --carbs-color: #558B2F;
        --fat-color: #2979FF;
        --water-color: #0288D1;
      }

      body {
        background-color: var(--dark-background);
        color: var(--dark-on-background);
        min-height: 100vh;
      }

      .app-container {
        background-color: var(--dark-surface);
        max-width: 3xl;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      .header {
        background-color: var(--dark-surface);
        border-bottom: 1px solid var(--dark-secondary);
      }

      .header-title {
        color: var(--dark-on-surface);
      }

      .header-subtitle {
        color: var(--dark-secondary-variant);
      }

      .logo {
        background: linear-gradient(135deg, var(--dark-success) 0%, var(--dark-success-variant) 100%);
        color: var(--dark-on-success);
      }

      .messages-container {
        background-color: var(--dark-background);
      }

      .user-message {
        background: linear-gradient(135deg, var(--dark-success) 0%, var(--dark-success-variant) 100%);
        color: var(--dark-on-success);
      }

      .ai-message {
        background-color: var(--dark-surface);
        border: 1px solid var(--dark-secondary);
        color: var(--dark-on-surface);
      }

      .system-message {
        background-color: var(--dark-info);
        color: var(--dark-on-info);
      }

      .input-area {
        background-color: var(--dark-surface);
        border-top: 1px solid var(--dark-secondary);
      }

      .text-input {
        background-color: var(--dark-primary-variant-2);
        border: 1px solid var(--dark-secondary);
        color: var(--dark-on-surface);
      }

      .text-input:focus {
        border-color: var(--dark-success);
        outline: none;
        box-shadow: 0 0 0 2px rgba(0, 200, 83, 0.2);
      }

      .text-input::placeholder {
        color: var(--dark-secondary-variant);
      }

      .send-button {
        background: linear-gradient(135deg, var(--dark-success) 0%, var(--dark-success-variant) 100%);
        color: var(--dark-on-success);
      }

      .send-button:hover {
        box-shadow: 0 4px 15px rgba(0, 200, 83, 0.4);
        transform: scale(1.02);
      }

      .send-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .chip {
        border: 1px solid var(--dark-secondary);
        color: var(--dark-secondary-variant);
        background-color: transparent;
        transition: all 0.2s ease;
      }

      .chip:hover {
        border-color: var(--dark-success);
        color: var(--dark-success);
      }

      .chip-selected {
        border-color: var(--dark-success) !important;
        background-color: rgba(0, 200, 83, 0.15) !important;
        color: var(--dark-success) !important;
      }

      .modal-overlay {
        background-color: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
      }

      .modal-content {
        background-color: var(--dark-surface);
        border: 1px solid var(--dark-secondary);
      }

      .modal-header {
        background: linear-gradient(135deg, var(--dark-success) 0%, var(--dark-success-variant) 100%);
        color: var(--dark-on-success);
      }

      .modal-close-btn {
        color: var(--dark-on-success);
      }

      .modal-close-btn:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }

      .modal-body {
        background-color: var(--dark-surface);
        max-height: 60vh;
        overflow-y: auto;
      }

      .modal-footer {
        background-color: var(--grey-light);
        border-top: 1px solid var(--dark-secondary);
      }

      .modal-label {
        color: var(--dark-secondary-variant);
      }

      .clear-btn {
        border: 1px solid var(--dark-secondary);
        color: var(--dark-on-surface);
        background-color: transparent;
      }

      .clear-btn:hover {
        background-color: var(--dark-secondary);
      }

      .typing-indicator {
        background-color: var(--dark-background);
      }

      .typing-dot {
        background-color: var(--dark-secondary-variant);
      }

      .typing-text {
        color: var(--dark-secondary-variant);
      }

      .scrollbar-thin::-webkit-scrollbar {
        width: 6px;
      }

      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: var(--dark-secondary);
        border-radius: 3px;
      }

      .nutrition-card {
        animation: fadeIn 0.3s ease-out;
        border: 1px solid var(--dark-secondary);
      }

      .nutrition-header {
        background-color: var(--dark-primary-variant-2);
        border-bottom: 1px solid var(--dark-secondary);
      }

      .nutrition-title {
        color: var(--dark-on-surface);
      }

      .nutrition-subtitle {
        color: var(--dark-secondary-variant);
      }

      .macro-box {
        background-color: var(--dark-primary-variant-2);
      }

      .macro-label {
        color: var(--dark-secondary-variant);
      }

      .macro-value {
        color: var(--dark-on-surface);
      }

      .macro-unit {
        color: var(--dark-secondary-variant);
      }

      .ingredients-section {
        border-top: 1px solid var(--dark-secondary);
      }

      .ingredients-label {
        color: var(--dark-secondary-variant);
      }

      .ingredient-name {
        color: var(--dark-on-surface);
      }

      .ingredient-detail {
        color: var(--dark-secondary-variant);
      }

      .health-comments {
        background-color: rgba(41, 121, 255, 0.1);
        border-top: 1px solid var(--dark-secondary);
        color: var(--dark-on-surface);
      }

      .concerns-section {
        border-top: 1px solid var(--dark-secondary);
      }

      .concern-issue {
        color: var(--dark-error);
      }

      .concern-explanation {
        color: var(--dark-secondary-variant);
      }

      .alternatives-section {
        border-top: 1px solid var(--dark-secondary);
      }

      .alternative-label {
        color: var(--dark-success);
      }

      .alternative-box {
        background-color: rgba(0, 200, 83, 0.05);
        border: 1px solid rgba(0, 200, 83, 0.2);
      }

      .alternative-name {
        color: var(--dark-on-surface);
      }

      .alternative-detail {
        color: var(--dark-secondary-variant);
      }

      .score-badge {
        border-radius: 50%;
        border: 2px solid;
      }

      .score-badge-high {
        border-color: var(--dark-success);
        color: var(--dark-success);
      }

      .score-badge-medium {
        border-color: var(--dark-warning);
        color: var(--dark-warning);
      }

      .score-badge-low {
        border-color: var(--dark-error);
        color: var(--dark-error);
      }

      .score-badge-bg {
        background-color: var(--dark-success);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header-btn {
        color: var(--dark-secondary-variant);
      }

      .header-btn:hover {
        background-color: var(--dark-secondary);
      }
    </style>
  </head>
  <body>
    <div class="flex flex-col h-screen max-w-3xl mx-auto app-container">

      <!-- Header -->
      <header class="flex items-center justify-between px-6 py-4 header sticky top-0 z-10">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl logo flex items-center justify-center font-bold text-lg shadow-lg">
            N
          </div>
          <div>
            <h1 class="text-lg font-bold header-title">NomAI</h1>
            <p class="text-xs header-subtitle">Your Nutrition Assistant</p>
          </div>
        </div>
        <button id="profileBtn" class="p-2 rounded-lg header-btn transition-colors" title="Profile">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
      </header>

      <!-- Messages Container -->
      <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6 messages-container scrollbar-thin">
        <!-- Messages will be inserted here -->
      </div>

      <!-- Typing Indicator -->
      <div id="typingIndicator" class="hidden px-6 py-4 typing-indicator">
        <div class="flex items-center gap-3 text-sm">
          <div class="flex gap-1">
            <span class="w-2 h-2 rounded-full animate-bounce typing-dot" style="animation-delay: 0ms"></span>
            <span class="w-2 h-2 rounded-full animate-bounce typing-dot" style="animation-delay: 150ms"></span>
            <span class="w-2 h-2 rounded-full animate-bounce typing-dot" style="animation-delay: 300ms"></span>
          </div>
          <span class="typing-text">Analyzing your meal...</span>
        </div>
      </div>

      <!-- Input Area -->
      <div class="p-4 input-area">
        <div class="flex gap-3">
          <input id="messageInput" type="text" placeholder="Describe your meal..." class="flex-1 px-4 py-3 rounded-xl text-input text-sm transition-all" />
          <button id="sendButton" class="px-6 py-3 rounded-xl send-button font-semibold text-sm transition-all">
            Analyze
          </button>
        </div>
        <div class="flex gap-3 mt-3 items-center text-xs">
          <input id="userIdInput" type="text" placeholder="User ID" class="px-3 py-1.5 rounded-lg text-input w-36 text-sm outline-none focus:ring-2 focus:ring-green-500" />
          <input id="imageUrlInput" type="text" placeholder="Or paste an image URL here..." class="flex-1 px-3 py-1.5 rounded-lg text-input text-sm outline-none focus:ring-2 focus:ring-green-500" />
        </div>
      </div>

      <!-- Profile Modal -->
      <div id="profileModal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center z-50">
        <div class="rounded-2xl w-full max-w-md mx-4 overflow-hidden shadow-2xl">
          <div class="flex items-center justify-between px-6 py-4 modal-header">
            <h2 class="text-lg font-bold">Your Profile</h2>
            <button id="closeModal" class="p-2 rounded-lg modal-close-btn transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="p-6 space-y-6 modal-body">
            <div>
              <label class="text-sm font-semibold modal-label block mb-3">Dietary Preferences</label>
              <div class="flex flex-wrap gap-2" id="dietaryOptions">
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="vegetarian">Vegetarian</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="vegan">Vegan</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="low-carb">Low Carb</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="high-protein">High Protein</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="keto">Keto</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="gluten-free">Gluten Free</button>
              </div>
            </div>
            <div>
              <label class="text-sm font-semibold modal-label block mb-3">Allergies</label>
              <div class="flex flex-wrap gap-2" id="allergyOptions">
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="nuts">Nuts</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="dairy">Dairy</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="eggs">Eggs</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="soy">Soy</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="wheat">Wheat</button>
              </div>
            </div>
            <div>
              <label class="text-sm font-semibold modal-label block mb-3">Health Goals</label>
              <div class="flex flex-wrap gap-2" id="goalsOptions">
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="weight-loss">Weight Loss</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="muscle-gain">Muscle Gain</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="maintenance">Maintenance</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="energy">Energy Boost</button>
                <button class="chip px-3 py-1.5 rounded-full text-sm" data-value="heart-health">Heart Health</button>
              </div>
            </div>
          </div>
          <div class="flex gap-3 px-6 py-4 modal-footer">
            <button id="clearProfile" class="px-4 py-2 rounded-lg clear-btn text-sm transition-colors">Clear All</button>
            <button id="saveProfile" class="px-4 py-2 rounded-lg send-button text-sm font-semibold transition-colors ml-auto">Save Profile</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      class ChatApp {
        constructor() {
          this.chatApiBase = `${window.location.protocol}//${window.location.host}/api/v1/chat`;
          this.userApiBase = `${window.location.protocol}//${window.location.host}/api/v1/users`;
          this.messages = document.getElementById('messages');
          this.messageInput = document.getElementById('messageInput');
          this.sendButton = document.getElementById('sendButton');
          this.userIdInput = document.getElementById('userIdInput');
          this.imageUrlInput = document.getElementById('imageUrlInput');
          this.typingIndicator = document.getElementById('typingIndicator');
          this.profileModal = document.getElementById('profileModal');
          this.isTyping = false;
          this.currentAssistantMessage = null;
          this.profile = this.loadProfile();
          this.userId = localStorage.getItem('user_id') || '';

          this.init();
          this.loadMessages();
        }

        init() {
          this.userIdInput.value = this.userId;

          this.userIdInput.addEventListener('change', () => {
            this.userId = this.userIdInput.value.trim();
            localStorage.setItem('user_id', this.userId);
            this.loadMessages();
          });

          this.sendButton.addEventListener('click', () => this.sendMessage());
          this.messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendMessage(); }
          });
          document.getElementById('profileBtn').addEventListener('click', () => this.openModal());
          document.getElementById('closeModal').addEventListener('click', () => this.closeModal());
          document.getElementById('saveProfile').addEventListener('click', () => this.saveProfile());
          document.getElementById('clearProfile').addEventListener('click', () => this.clearProfile());
          this.profileModal.addEventListener('click', (e) => { if (e.target === this.profileModal) this.closeModal(); });

          document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
              chip.classList.toggle('chip-selected');
            });
          });

          this.updateChipSelections();
        }

        loadProfile() {
          const stored = localStorage.getItem('user_profile');
          if (stored) {
            return JSON.parse(stored);
          }
          return { dietary_preferences: [], allergies: [], selected_goals: [] };
        }

        saveProfileToStorage() {
          localStorage.setItem('user_profile', JSON.stringify(this.profile));
          this.updateChipSelections();
        }

        updateChipSelections() {
          const keyMap = {
            'dietaryOptions': 'dietary_preferences',
            'allergyOptions': 'allergies',
            'goalsOptions': 'selected_goals'
          };

          Object.entries(keyMap).forEach(([groupId, key]) => {
            const selected = this.profile[key] || [];
            document.querySelectorAll(`#${groupId} .chip`).forEach(chip => {
              if (selected.includes(chip.dataset.value)) {
                chip.classList.add('chip-selected');
              } else {
                chip.classList.remove('chip-selected');
              }
            });
          });
        }

        openModal() {
          this.updateChipSelections();
          this.profileModal.classList.remove('hidden');
        }

        closeModal() {
          this.profileModal.classList.add('hidden');
        }

        getSelected(groupId) {
          return Array.from(document.querySelectorAll(`#${groupId} .chip-selected`)).map(c => c.dataset.value);
        }

        saveProfile() {
          this.profile.dietary_preferences = this.getSelected('dietaryOptions');
          this.profile.allergies = this.getSelected('allergyOptions');
          this.profile.selected_goals = this.getSelected('goalsOptions');
          this.saveProfileToStorage();
          this.closeModal();
        }

        clearProfile() {
          this.profile = { dietary_preferences: [], allergies: [], selected_goals: [] };
          this.saveProfileToStorage();
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('chip-selected'));
        }

        getCurrentProfile() {
          return {
            dietary_preferences: this.getSelected('dietaryOptions'),
            allergies: this.getSelected('allergyOptions'),
            selected_goals: this.getSelected('goalsOptions')
          };
        }

        async loadMessages() {
          if (!this.userId) {
            this.addMessage({ role: 'system', content: 'Please enter your User ID to load chat history.' });
            return;
          }

          try {
            const res = await fetch(`${this.userApiBase}?user_id=${encodeURIComponent(this.userId)}&offset=0&limit=50`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            this.messages.innerHTML = '';
            for (const msg of data.messages || []) {
              const msgData = {
                role: msg.role,
                content: msg.text || msg.content || '',
                image_url: msg.image_url,
                nutrition_data: msg.sources?.nutrition_data
              };
              this.addMessage(msgData);
            }
          } catch (err) {
            this.addMessage({ role: 'system', content: `Error loading messages: ${err.message}` });
          }
        }

        async sendMessage() {
          const message = this.messageInput.value.trim();
          if (!message && !this.imageUrlInput.value.trim()) return;
          if (this.isTyping) return;
          if (!this.userId) {
            this.userId = this.userIdInput.value.trim() || 'user_' + Date.now();
            this.userIdInput.value = this.userId;
            localStorage.setItem('user_id', this.userId);
          }

          const imageUrl = this.imageUrlInput.value.trim() || null;
          const currentProfile = this.getCurrentProfile();

          const userMsg = { role: 'user', content: message || '[Image provided]', image_url: imageUrl };
          this.addMessage(userMsg);
          this.messageInput.value = '';
          this.imageUrlInput.value = '';
          this.setTyping(true);
          this.currentAssistantMessage = null;

          try {
            const res = await fetch(`${this.chatApiBase}/messages`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                text: message,
                user_id: this.userId,
                image_url: imageUrl,
                image_data: null,
                local_time: new Date().toISOString(),
                ...currentProfile
              })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            await this.processResponse(await res.json());
          } catch (err) {
            this.addMessage({ role: 'system', content: `Error: ${err.message}` });
          }
          finally { this.setTyping(false); this.currentAssistantMessage = null; }
        }

        async processResponse(data) {
          if (data.ai_answer) {
            this.currentAssistantMessage = { role: 'assistant', content: data.ai_answer, nutrition_data: data.nutrition_data, tools_used: data.tools_used };
            this.addMessage(this.currentAssistantMessage);
          }
          if (data.error) { this.addMessage({ role: 'system', content: `Error: ${data.error}` }); }
        }

        addMessage(data) {
          const div = document.createElement('div');
          div.className = `flex ${data.role === 'user' ? 'justify-end' : 'justify-start'}`;

          if (data.role === 'user') {
            let messageHtml = '';
            if (data.image_url) {
              messageHtml += `<img src="${this.escapeHtml(data.image_url)}" alt="User image" class="mb-2 max-w-full h-40 object-contain rounded-lg" />`;
            }
            messageHtml += `<p class="text-sm">${this.escapeHtml(data.content)}</p>`;
            div.innerHTML = `<div class="user-message px-5 py-3 rounded-2xl rounded-br-md max-w-[85%] shadow-lg">${messageHtml}</div>`;
          } else if (data.role === 'system') {
            div.innerHTML = `<div class="system-message px-4 py-2 rounded-xl rounded-bl-md text-xs">${this.escapeHtml(data.content)}</div>`;
          } else {
            const bubble = document.createElement('div');
            bubble.className = 'ai-message px-5 py-4 rounded-2xl rounded-bl-md shadow-lg max-w-[85%] w-full';

            let contentText = data.content || '';
            let html = '';
            if (contentText) {
              const renderedMarkdown = marked.parse(contentText);
              html = `<div class="text-sm leading-relaxed mb-4">${renderedMarkdown}</div>`;
            }

            if (data.nutrition_data) {
              const nutrition = data.nutrition_data.response || data.nutrition_data;
              html += this.renderNutritionCard(nutrition);
            }

            bubble.innerHTML = html;
            div.appendChild(bubble);
          }

          this.messages.appendChild(div);
          this.scrollToBottom();
          return div;
        }

        renderNutritionCard(nutrition) {
          const foodName = nutrition.foodName || 'Unknown Food';
          const healthScore = nutrition.overallHealthScore || 0;
          const portionSize = nutrition.portionSize || 0;
          const portion = nutrition.portion || 'g';
          const confidence = nutrition.confidenceScore || 0;
          const ingredients = nutrition.ingredients || [];
          const concerns = nutrition.primaryConcerns || [];
          const alternatives = nutrition.suggestAlternatives || [];

          const totalCalories = ingredients.reduce((s, i) => s + (i.calories || 0), 0);
          const totalProtein = ingredients.reduce((s, i) => s + (i.protein || 0), 0);
          const totalCarbs = ingredients.reduce((s, i) => s + (i.carbs || 0), 0);
          const totalFat = ingredients.reduce((s, i) => s + (i.fat || 0), 0);

          const scoreColor = healthScore >= 8 ? 'var(--dark-success)' : healthScore >= 5 ? 'var(--dark-warning)' : 'var(--dark-error)';
          const scoreBg = healthScore >= 8 ? 'rgba(0, 200, 83, 0.1)' : healthScore >= 5 ? 'rgba(255, 179, 0, 0.1)' : 'rgba(211, 47, 47, 0.1)';

          let html = `
          <div class="nutrition-card mt-4 rounded-xl overflow-hidden">
            <div class="nutrition-header px-4 py-3 flex items-center justify-between">
              <div>
                <h3 class="font-semibold nutrition-title">${this.escapeHtml(foodName)}</h3>
                <p class="text-xs nutrition-subtitle">${portionSize}${portion} • Confidence: ${confidence}/10</p>
              </div>
              <div class="text-center">
                <div class="relative w-14 h-14">
                  <svg class="w-14 h-14 transform -rotate-90" viewBox="0 0 36 36">
                    <path class="text-gray-700" stroke="currentColor" stroke-width="3" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                    <path style="color: ${scoreColor}" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="${healthScore * 10}, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                  </svg>
                  <span class="absolute inset-0 flex items-center justify-center text-sm font-bold" style="color: ${scoreColor}">${healthScore}</span>
                </div>
                <p class="text-[10px] nutrition-subtitle mt-1">out of 10</p>
              </div>
            </div>

            <div class="grid grid-cols-4 gap-2 p-4" style="background-color: var(--dark-surface);">
              <div class="text-center p-2 macro-box rounded-lg">
                <p class="text-xs macro-label mb-1">Calories</p>
                <p class="font-bold macro-value">${totalCalories}</p>
                <p class="text-[10px] macro-unit">kcal</p>
              </div>
              <div class="text-center p-2 macro-box rounded-lg">
                <p class="text-xs macro-label mb-1">Protein</p>
                <p class="font-bold macro-value">${totalProtein}g</p>
                <p class="text-[10px] macro-unit">grams</p>
              </div>
              <div class="text-center p-2 macro-box rounded-lg">
                <p class="text-xs macro-label mb-1">Carbs</p>
                <p class="font-bold macro-value">${totalCarbs}g</p>
                <p class="text-[10px] macro-unit">grams</p>
              </div>
              <div class="text-center p-2 macro-box rounded-lg">
                <p class="text-xs macro-label mb-1">Fat</p>
                <p class="font-bold macro-value">${totalFat}g</p>
                <p class="text-[10px] macro-unit">grams</p>
              </div>
            </div>

            ${ingredients.length > 0 ? `
            <div class="ingredients-section px-4 py-3">
              <p class="text-xs font-semibold modal-label mb-2">Ingredients Breakdown</p>
              <div class="space-y-2">
                ${ingredients.map(ing => `
                  <div class="flex items-center justify-between text-xs">
                    <span class="ingredient-name">${this.escapeHtml(ing.name)}</span>
                    <span class="ingredient-detail">${ing.calories || 0} cal • ${ing.protein || 0}g P • ${ing.carbs || 0}g C • ${ing.fat || 0}g F</span>
                  </div>
                `).join('')}
              </div>
            </div>
            ` : ''}

            ${nutrition.overallHealthComments ? `
            <div class="health-comments px-4 py-3">
              <p class="text-xs">${this.escapeHtml(nutrition.overallHealthComments)}</p>
            </div>
            ` : ''}

            ${concerns.length > 0 ? `
            <div class="concerns-section px-4 py-3">
              <p class="text-xs font-semibold concern-issue mb-2">⚠️ Concerns</p>
              ${concerns.map(c => `
                <div class="mb-2">
                  <p class="text-xs font-medium concern-issue">${this.escapeHtml(c.issue)}</p>
                  <p class="text-xs concern-explanation mt-0.5">${this.escapeHtml(c.explanation)}</p>
                </div>
              `).join('')}
            </div>
            ` : ''}

            ${alternatives.length > 0 ? `
            <div class="alternatives-section px-4 py-3">
              <p class="text-xs font-semibold alternative-label mb-2">💡 Healthier Alternatives</p>
              <div class="space-y-2">
                ${alternatives.slice(0, 3).map(alt => `
                  <div class="alternative-box flex items-center justify-between p-2 rounded-lg">
                    <div>
                      <p class="text-xs font-medium alternative-name">${this.escapeHtml(alt.name)}</p>
                      <p class="text-[10px] alternative-detail">${alt.calories || 0} cal • ${alt.protein || 0}g P</p>
                    </div>
                    <span class="px-2 py-0.5 rounded-full text-[10px] font-semibold ${(alt.healthScore || 0) >= 8 ? 'score-badge-high' : 'score-badge-medium'}" style="background-color: ${(alt.healthScore || 0) >= 8 ? 'rgba(0, 200, 83, 0.15)' : 'rgba(255, 179, 0, 0.15)'}">${alt.healthScore || 0}/10</span>
                  </div>
                `).join('')}
              </div>
            </div>
            ` : ''}
          </div>`;

          return html;
        }

        escapeHtml(text) {
          if (!text) return '';
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }

        setTyping(on) {
          this.isTyping = on;
          this.sendButton.disabled = on;
          this.typingIndicator.classList.toggle('hidden', !on);
          if (on) this.scrollToBottom();
        }

        scrollToBottom() { this.messages.scrollTop = this.messages.scrollHeight; }
      }

      new ChatApp();
    </script>
  </body>
</html>
