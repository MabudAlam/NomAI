<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NomAI - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { font-family: 'Inter', sans-serif; }
      .scrollbar-thin::-webkit-scrollbar { width: 6px; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
      .message-bubble { white-space: pre-wrap; }
      .nutrition-card { animation: fadeIn 0.3s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .score-ring { stroke-dasharray: 251; }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 min-h-screen">
    <div class="flex flex-col h-screen max-w-3xl mx-auto bg-white shadow-xl">

      <!-- Header -->
      <header class="flex items-center justify-between px-6 py-4 border-b border-gray-100 bg-white sticky top-0 z-10">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-green-500 to-emerald-600 text-white flex items-center justify-center font-bold text-lg shadow-lg">
            N
          </div>
          <div>
            <h1 class="text-lg font-bold text-gray-900">NomAI</h1>
            <p class="text-xs text-gray-500">Your Nutrition Assistant</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button id="loadMessagesBtn" class="p-2 rounded-lg hover:bg-gray-100 transition-colors" title="Load Messages">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
          <button id="settingsBtn" class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Messages Container -->
      <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6 bg-gray-50 scrollbar-thin">
        <!-- Messages will be inserted here -->
      </div>

      <!-- Typing Indicator -->
      <div id="typingIndicator" class="hidden px-6 py-4 bg-gray-50">
        <div class="flex items-center gap-3 text-sm text-gray-500">
          <div class="flex gap-1">
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
          </div>
          <span>Analyzing your meal...</span>
        </div>
      </div>

      <!-- User Profile Chips -->
      <div id="profileChips" class="px-6 py-3 border-t border-gray-100 bg-white">
        <div class="flex flex-wrap items-center gap-4 text-xs">
          <div class="flex items-center gap-2">
            <span class="text-gray-500 font-medium">Diet:</span>
            <div class="flex flex-wrap gap-1" id="dietaryChips">
              <button class="chip px-2 py-1 rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 transition-colors" data-value="vegetarian">Vegetarian</button>
              <button class="chip px-2 py-1 rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 transition-colors" data-value="vegan">Vegan</button>
              <button class="chip px-2 py-1 rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 transition-colors" data-value="low-carb">Low Carb</button>
              <button class="chip px-2 py-1 rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 transition-colors" data-value="high-protein">High Protein</button>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-gray-500 font-medium">Goals:</span>
            <div class="flex flex-wrap gap-1" id="goalsChips">
              <button class="chip px-2 py-1 rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 transition-colors" data-value="weight-loss">Weight Loss</button>
              <button class="chip px-2 py-1 rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 transition-colors" data-value="muscle-gain">Muscle Gain</button>
              <button class="chip px-2 py-1 rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 transition-colors" data-value="maintenance">Maintenance</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="p-4 border-t border-gray-200 bg-white">
        <div class="flex gap-3">
          <input id="messageInput" type="text" placeholder="Describe your meal or paste an image URL..." class="flex-1 px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all" />
          <button id="sendButton" class="px-6 py-3 rounded-xl bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold text-sm hover:shadow-lg hover:scale-[1.02] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
            Analyze
          </button>
        </div>
        <div class="flex gap-3 mt-3 items-center text-xs text-gray-500">
          <input id="userIdInput" type="text" placeholder="User ID" value="user_123" class="px-3 py-1.5 rounded-lg border border-gray-200 w-28 outline-none focus:ring-2 focus:ring-green-500" />
          <input id="imageUrlInput" type="text" placeholder="Or paste an image URL here..." class="flex-1 px-3 py-1.5 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-green-500" />
        </div>
      </div>

      <!-- Settings Modal -->
      <div id="settingsModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md mx-4 overflow-hidden shadow-2xl">
          <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
            <h2 class="text-lg font-bold">Your Profile</h2>
            <button id="closeModal" class="p-2 rounded-lg hover:bg-gray-100">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="p-6 space-y-6">
            <div>
              <label class="text-sm font-semibold block mb-3">Dietary Preferences</label>
              <div class="flex flex-wrap gap-2" id="dietaryOptions">
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-green-500 hover:text-green-600 transition-colors" data-value="vegetarian">Vegetarian</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-green-500 hover:text-green-600 transition-colors" data-value="vegan">Vegan</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-green-500 hover:text-green-600 transition-colors" data-value="low-carb">Low Carb</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-green-500 hover:text-green-600 transition-colors" data-value="high-protein">High Protein</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-green-500 hover:text-green-600 transition-colors" data-value="keto">Keto</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-green-500 hover:text-green-600 transition-colors" data-value="gluten-free">Gluten Free</button>
              </div>
            </div>
            <div>
              <label class="text-sm font-semibold block mb-3">Allergies</label>
              <div class="flex flex-wrap gap-2" id="allergyOptions">
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-red-500 hover:text-red-600 transition-colors" data-value="nuts">Nuts</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-red-500 hover:text-red-600 transition-colors" data-value="dairy">Dairy</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-red-500 hover:text-red-600 transition-colors" data-value="eggs">Eggs</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-red-500 hover:text-red-600 transition-colors" data-value="soy">Soy</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-red-500 hover:text-red-600 transition-colors" data-value="wheat">Wheat</button>
              </div>
            </div>
            <div>
              <label class="text-sm font-semibold block mb-3">Health Goals</label>
              <div class="flex flex-wrap gap-2" id="goalsOptions">
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-green-500 hover:text-green-600 transition-colors" data-value="weight-loss">Weight Loss</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-green-500 hover:text-green-600 transition-colors" data-value="muscle-gain">Muscle Gain</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-green-500 hover:text-green-600 transition-colors" data-value="maintenance">Maintenance</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-green-500 hover:text-green-600 transition-colors" data-value="energy">Energy Boost</button>
                <button class="chip px-3 py-1.5 rounded-full border border-gray-200 text-sm hover:border-green-500 hover:text-green-600 transition-colors" data-value="heart-health">Heart Health</button>
              </div>
            </div>
          </div>
          <div class="flex gap-3 px-6 py-4 border-t border-gray-100 bg-gray-50">
            <button id="clearProfile" class="px-4 py-2 rounded-lg border border-gray-200 text-sm hover:bg-gray-100 transition-colors">Clear</button>
            <button id="saveProfile" class="px-4 py-2 rounded-lg bg-gradient-to-r from-green-500 to-emerald-600 text-white text-sm font-semibold hover:shadow-lg transition-colors ml-auto">Save</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      class ChatApp {
        constructor() {
          this.apiBase = `${window.location.protocol}//${window.location.host}/chat`;
          this.messages = document.getElementById('messages');
          this.messageInput = document.getElementById('messageInput');
          this.sendButton = document.getElementById('sendButton');
          this.userIdInput = document.getElementById('userIdInput');
          this.imageUrlInput = document.getElementById('imageUrlInput');
          this.typingIndicator = document.getElementById('typingIndicator');
          this.settingsModal = document.getElementById('settingsModal');
          this.isTyping = false;
          this.currentAssistantMessage = null;
          this.profile = { dietary_preferences: [], allergies: [], selected_goals: [] };

          this.init();
        }

        init() {
          this.sendButton.addEventListener('click', () => this.sendMessage());
          this.messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendMessage(); }
          });
          document.getElementById('settingsBtn').addEventListener('click', () => this.openModal());
          document.getElementById('loadMessagesBtn').addEventListener('click', () => this.loadMessages());
          document.getElementById('closeModal').addEventListener('click', () => this.closeModal());
          document.getElementById('saveProfile').addEventListener('click', () => this.saveProfile());
          document.getElementById('clearProfile').addEventListener('click', () => this.clearProfile());
          this.settingsModal.addEventListener('click', (e) => { if (e.target === this.settingsModal) this.closeModal(); });
          document.querySelectorAll('.chip').forEach(chip => { chip.addEventListener('click', () => chip.classList.toggle('selected')); });
        }

        openModal() { this.settingsModal.classList.remove('hidden'); }
        closeModal() { this.settingsModal.classList.add('hidden'); }

        getSelected(groupId) { return Array.from(document.querySelectorAll(`#${groupId} .chip.selected`)).map(c => c.dataset.value); }

        saveProfile() {
          this.profile.dietary_preferences = this.getSelected('dietaryOptions');
          this.profile.allergies = this.getSelected('allergyOptions');
          this.profile.selected_goals = this.getSelected('goalsOptions');
          this.updateProfileChips();
          this.closeModal();
        }

        clearProfile() {
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
          this.profile = { dietary_preferences: [], allergies: [], selected_goals: [] };
          this.updateProfileChips();
        }

        updateProfileChips() {
          document.querySelectorAll('#dietaryChips .chip').forEach(chip => { chip.classList.toggle('selected', this.profile.dietary_preferences.includes(chip.dataset.value)); });
          document.querySelectorAll('#goalsChips .chip').forEach(chip => { chip.classList.toggle('selected', this.profile.selected_goals.includes(chip.dataset.value)); });
        }

        getCurrentProfile() {
          return {
            dietary_preferences: this.getSelected('dietaryOptions'),
            allergies: this.getSelected('allergyOptions'),
            selected_goals: this.getSelected('goalsOptions')
          };
        }

        async loadMessages() {
          const userId = this.userIdInput.value.trim() || 'user_123';
          try {
            const res = await fetch(`${this.apiBase}/getMessages?user_id=${encodeURIComponent(userId)}&offset=0&limit=20`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            this.messages.innerHTML = '';
            for (const msg of data.messages || []) {
              this.addMessage({ role: msg.role, content: msg.text || msg.content || '' });
            }
          } catch (err) { this.addMessage({ role: 'system', content: `Error: ${err.message}` }); }
        }

        async sendMessage() {
          const message = this.messageInput.value.trim();
          if (!message && !this.imageUrlInput.value.trim()) return;
          if (this.isTyping) return;

          const userId = this.userIdInput.value.trim() || 'user_123';
          const imageUrl = this.imageUrlInput.value.trim() || null;
          const currentProfile = this.getCurrentProfile();

          this.addMessage({ role: 'user', content: message || '[Image URL provided]' });
          this.messageInput.value = '';
          this.setTyping(true);
          this.currentAssistantMessage = null;

          try {
            const res = await fetch(`${this.apiBase}/message`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: message, user_id: userId, image_url: imageUrl, image_data: null, local_time: new Date().toISOString(), ...currentProfile })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            await this.processResponse(await res.json());
          } catch (err) { this.addMessage({ role: 'system', content: `Error: ${err.message}` }); }
          finally { this.setTyping(false); this.currentAssistantMessage = null; }
        }

        async processResponse(data) {
          if (data.ai_answer) {
            this.currentAssistantMessage = { role: 'assistant', content: data.ai_answer, tool_response: data.tool_response };
            this.addMessage(this.currentAssistantMessage);
          }
          if (data.error) { this.addMessage({ role: 'system', content: `Error: ${data.error}` }); }
        }

        addMessage(data) {
          const div = document.createElement('div');
          div.className = `flex ${data.role === 'user' ? 'justify-end' : 'justify-start'}`;

          if (data.role === 'user') {
            div.innerHTML = `<div class="bg-gradient-to-r from-green-500 to-emerald-600 text-white px-5 py-3 rounded-2xl rounded-br-md max-w-[85%] shadow-lg"><p class="text-sm">${this.escapeHtml(data.content)}</p></div>`;
          } else if (data.role === 'system') {
            div.innerHTML = `<div class="bg-blue-100 text-blue-800 px-4 py-2 rounded-xl rounded-bl-md text-xs">${this.escapeHtml(data.content)}</div>`;
          } else {
            const bubble = document.createElement('div');
            bubble.className = 'bg-white px-5 py-4 rounded-2xl rounded-bl-md shadow-lg max-w-[85%] w-full';
            
            let contentText = typeof data.content === 'string' ? data.content : (data.content?.message || '');
            let html = contentText ? `<div class="text-sm leading-relaxed mb-4">${contentText}</div>` : '';
            
            if (data.tool_response) {
              const nutrition = data.tool_response.response || data.tool_response;
              html += this.renderNutritionCard(nutrition, data.tool_response.metadata);
            }
            
            bubble.innerHTML = html;
            div.appendChild(bubble);
            data._element = div;
          }

          this.messages.appendChild(div);
          this.scrollToBottom();
          return div;
        }

        renderNutritionCard(nutrition, metadata) {
          const foodName = nutrition.foodName || 'Unknown Food';
          const healthScore = nutrition.overallHealthScore || 0;
          const portionSize = nutrition.portionSize || 0;
          const portion = nutrition.portion || 'g';
          const confidence = nutrition.confidenceScore || 0;
          const ingredients = nutrition.ingredients || [];
          const concerns = nutrition.primaryConcerns || [];
          const alternatives = nutrition.suggestAlternatives || [];

          const totalCalories = ingredients.reduce((s, i) => s + (i.calories || 0), 0);
          const totalProtein = ingredients.reduce((s, i) => s + (i.protein || 0), 0);
          const totalCarbs = ingredients.reduce((s, i) => s + (i.carbs || 0), 0);
          const totalFat = ingredients.reduce((s, i) => s + (i.fat || 0), 0);

          const scoreColor = healthScore >= 8 ? 'text-green-600' : healthScore >= 5 ? 'text-yellow-600' : 'text-red-600';
          const scoreBg = healthScore >= 8 ? 'bg-green-50 border-green-200' : healthScore >= 5 ? 'bg-yellow-50 border-yellow-200' : 'bg-red-50 border-red-200';

          let html = `
          <div class="nutrition-card mt-4 border border-gray-200 rounded-xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between">
              <div>
                <h3 class="font-semibold text-gray-900">${this.escapeHtml(foodName)}</h3>
                <p class="text-xs text-gray-500">${portionSize}${portion} • Confidence: ${confidence}/10</p>
              </div>
              <div class="text-center">
                <div class="relative w-14 h-14">
                  <svg class="w-14 h-14 transform -rotate-90" viewBox="0 0 36 36">
                    <path class="text-gray-200" stroke="currentColor" stroke-width="3" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                    <path class="${healthScore >= 8 ? 'text-green-500' : healthScore >= 5 ? 'text-yellow-500' : 'text-red-500'}" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="${healthScore * 10}, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                  </svg>
                  <span class="absolute inset-0 flex items-center justify-center text-sm font-bold ${scoreColor}">${healthScore}</span>
                </div>
                <p class="text-[10px] text-gray-500 mt-1">out of 10</p>
              </div>
            </div>

            <!-- Macros Grid -->
            <div class="grid grid-cols-4 gap-2 p-4 bg-white">
              <div class="text-center p-2 bg-gray-50 rounded-lg">
                <p class="text-xs text-gray-500 mb-1">Calories</p>
                <p class="font-bold text-gray-900">${totalCalories}</p>
                <p class="text-[10px] text-gray-400">kcal</p>
              </div>
              <div class="text-center p-2 bg-gray-50 rounded-lg">
                <p class="text-xs text-gray-500 mb-1">Protein</p>
                <p class="font-bold text-gray-900">${totalProtein}g</p>
                <p class="text-[10px] text-gray-400">grams</p>
              </div>
              <div class="text-center p-2 bg-gray-50 rounded-lg">
                <p class="text-xs text-gray-500 mb-1">Carbs</p>
                <p class="font-bold text-gray-900">${totalCarbs}g</p>
                <p class="text-[10px] text-gray-400">grams</p>
              </div>
              <div class="text-center p-2 bg-gray-50 rounded-lg">
                <p class="text-xs text-gray-500 mb-1">Fat</p>
                <p class="font-bold text-gray-900">${totalFat}g</p>
                <p class="text-[10px] text-gray-400">grams</p>
              </div>
            </div>

            <!-- Ingredients -->
            ${ingredients.length > 0 ? `
            <div class="px-4 py-3 border-t border-gray-100">
              <p class="text-xs font-semibold text-gray-700 mb-2">Ingredients Breakdown</p>
              <div class="space-y-2">
                ${ingredients.map(ing => `
                  <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-700">${this.escapeHtml(ing.name)}</span>
                    <span class="text-gray-500">${ing.calories || 0} cal • ${ing.protein || 0}g P • ${ing.carbs || 0}g C • ${ing.fat || 0}g F</span>
                  </div>
                `).join('')}
              </div>
            </div>
            ` : ''}

            <!-- Health Comments -->
            ${nutrition.overallHealthComments ? `
            <div class="px-4 py-3 border-t border-gray-100 bg-blue-50/50">
              <p class="text-xs text-gray-700">${this.escapeHtml(nutrition.overallHealthComments)}</p>
            </div>
            ` : ''}

            <!-- Concerns -->
            ${concerns.length > 0 ? `
            <div class="px-4 py-3 border-t border-gray-100">
              <p class="text-xs font-semibold text-red-600 mb-2">⚠️ Concerns</p>
              ${concerns.map(c => `
                <div class="mb-2">
                  <p class="text-xs font-medium text-red-700">${this.escapeHtml(c.issue)}</p>
                  <p class="text-xs text-gray-600 mt-0.5">${this.escapeHtml(c.explanation)}</p>
                </div>
              `).join('')}
            </div>
            ` : ''}

            <!-- Alternatives -->
            ${alternatives.length > 0 ? `
            <div class="px-4 py-3 border-t border-gray-100">
              <p class="text-xs font-semibold text-green-700 mb-2">💡 Healthier Alternatives</p>
              <div class="space-y-2">
                ${alternatives.slice(0, 3).map(alt => `
                  <div class="flex items-center justify-between p-2 bg-green-50/50 rounded-lg">
                    <div>
                      <p class="text-xs font-medium text-gray-800">${this.escapeHtml(alt.name)}</p>
                      <p class="text-[10px] text-gray-500">${alt.calories || 0} cal • ${alt.protein || 0}g P</p>
                    </div>
                    <span class="px-2 py-0.5 rounded-full text-[10px] font-semibold ${(alt.healthScore || 0) >= 8 ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${alt.healthScore || 0}/10</span>
                  </div>
                `).join('')}
              </div>
            </div>
            ` : ''}

            <!-- Metadata -->
            ${metadata ? `
            <div class="px-4 py-2 bg-gray-50 border-t border-gray-100 text-[10px] text-gray-400">
              ${metadata.execution_time_seconds ? `Analysis time: ${metadata.execution_time_seconds.toFixed(1)}s` : ''}
              ${metadata.estimated_cost ? ` • Cost: $${metadata.estimated_cost.toFixed(5)}` : ''}
            </div>
            ` : ''}
          </div>`;

          return html;
        }

        escapeHtml(text) {
          if (!text) return '';
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }

        setTyping(on) {
          this.isTyping = on;
          this.sendButton.disabled = on;
          this.typingIndicator.classList.toggle('hidden', !on);
          if (on) this.scrollToBottom();
        }

        scrollToBottom() { this.messages.scrollTop = this.messages.scrollHeight; }
      }

      new ChatApp();
    </script>
  </body>
</html>
